# ============================================================
#  Rice Price Forecasting — Pipeline Configuration
#  Edit this file to tune parameters without touching source code.
# ============================================================

# -----------------------------------------------------------
# DATA
# -----------------------------------------------------------
data:
  file: "Rice_merged_master.xlsx"    # path to your Excel data file
  date_col: "DATE_STD"
  state_col: "STATE_KEY"
  target_col: "Modal Price"
  use_sample: false                  # set true to use data/sample/sample_data.csv

# -----------------------------------------------------------
# FEATURE ENGINEERING
# -----------------------------------------------------------
features:
  base_temp: 10.0                    # rice base temperature for GDD (°C)
  price_lags: [1, 3, 7, 14, 30]
  rolling_windows: [7, 14, 30]
  climate_lags: [7, 14]
  climate_cols: ["PRECTOTCORR", "T2M_MAX", "T2M_MIN"]

# -----------------------------------------------------------
# ACF / PERIODOGRAM
# -----------------------------------------------------------
acf:
  use_national_series: true
  select_states: ["Karnataka", "Tamil Nadu", "Punjab", "Andhra Pradesh", "West Bengal"]
  max_lags: 60
  freq: "W"                          # "W" = weekly | "D" = daily
  fig_dpi: 200

# -----------------------------------------------------------
# TRAIN / VAL / TEST SPLIT
# -----------------------------------------------------------
split:
  test_fraction: 0.20
  min_rows_state: 120
  n_folds: 10
  val_block_frac: 0.10
  min_val_block: 30

# -----------------------------------------------------------
# BASELINE MODELS (Step 6)
# -----------------------------------------------------------
baselines:
  ridge_alpha: 1.0
  rf_n_estimators: 600
  lgbm_n_estimators: 5000
  lgbm_learning_rate: 0.02
  xgb_n_estimators: 3000
  xgb_learning_rate: 0.03
  xgb_max_depth: 8

# -----------------------------------------------------------
# QUANTUM FEATURE SELECTION
# -----------------------------------------------------------
qga:
  population: 28
  generations: 18
  elite_k: 6
  lambda_feat: 0.02                  # feature-count penalty weight
  seed: 42

qaco:
  n_ants: 20
  iterations: 12
  select_ratio: 0.35
  evaporation: 0.25
  seed: 42

xgb_eval:                            # lightweight XGB for QFS fitness
  n_estimators: 800
  learning_rate: 0.05
  max_depth: 6
  subsample: 0.85
  colsample_bytree: 0.85
  reg_lambda: 2.0

# -----------------------------------------------------------
# QPSO HYPERPARAMETER OPTIMISATION
# -----------------------------------------------------------
qpso:
  n_particles: 20
  iterations: 30
  beta: 0.75                         # contraction-expansion coefficient
  seed: 42
  param_bounds:
    learning_rate: [0.01, 0.15]
    max_depth: [3, 12]
    subsample: [0.60, 0.95]
    colsample_bytree: [0.60, 0.95]
    reg_lambda: [0.0, 10.0]
    min_child_weight: [1.0, 10.0]
    n_estimators: [500, 5000]

# -----------------------------------------------------------
# HYBRID MODEL (XGBoost Trend + LSTM Residuals)
# -----------------------------------------------------------
hybrid:
  seq_len: 14                        # LSTM input window length (days)
  horizons: [7, 14, 30]             # forecast horizons (days ahead)
  lstm_units: [64, 32]
  dropout: 0.2
  epochs: 30
  batch_size: 256
  early_stopping_patience: 5
  learning_rate: 0.001

# -----------------------------------------------------------
# OUTPUT PATHS
# -----------------------------------------------------------
outputs:
  dir: "outputs"
  acf_fig: "Fig_ACF.png"
  periodogram_fig: "Fig_Periodogram_DoubleLog.png"
  horizon_fig: "Fig_True_Horizon_Performance.png"
  parquet: "X_full.parquet"
  fold_indices: "fold_indices.pkl"
  qga_features: "features_QGA.txt"
  qaco_features: "features_QACO.txt"
  best_params: "best_xgb_params.json"
  horizon_csv: "horizon_results.csv"
